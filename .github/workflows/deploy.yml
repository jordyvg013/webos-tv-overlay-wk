name: Bouw webOS App (.ipk)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Nodig voor LG Tools)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installeer LG webOS CLI Tools
        run: npm install -g @webosose/ares-cli

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Genereer web-bestanden
        run: flutter create . --platforms web

      - name: Installeer dependencies
        run: flutter pub get

      # '--base-href="."' voorkomt een zwart scherm op webOS doordat scripts relatief geladen worden.
      # Minificatie-problemen voorkomen we nu door '--no-minify' in de ares-package stap.
      - name: Bouw de Flutter Web basis
        run: flutter build web --release --base-href="."

      - name: Configureer webOS App Bestanden
        run: |
          mkdir -p build/web

          # Kopieer leeuw-met-rode-kaart als app-icoon
          cp assets/images/0VCil-removebg-preview.png build/web/icon.png

          # Verplicht appinfo.json voor webOS
          cat > build/web/appinfo.json << 'EOF'
          {
              "id": "com.jordy.webostvoverlay",
              "version": "1.0.0",
              "vendor": "Jordy",
              "type": "web",
              "main": "index.html",
              "title": "Match Overlay WK",
              "icon": "icon.png",
              "bgColor": "#000000",
              "transparent": true
          }
          EOF

      - name: Verpak de app tot webOS .ipk bestand (zonder dubbele minificatie)
        run: ares-package build/web -o . --no-minify

      - name: Upload het .ipk bestand naar GitHub
        uses: actions/upload-artifact@v4
        with:
          name: webos-app-package
          path: "*.ipk"
          retention-days: 30
